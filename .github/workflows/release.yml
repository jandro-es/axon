# Release: on every v* tag, cross-compile the four platform binaries (with the
# dashboard SPA embedded), checksum them, and publish a GitHub Release. These
# assets are what `install.sh` and `axon update` consume (checksums.txt is the
# integrity anchor — never remove it from the asset list).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build release binaries + checksums
        run: make release VERSION="${GITHUB_REF_NAME#v}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
