name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)" || (echo 'gofmt needed:'; gofmt -l .; exit 1)

      # Runs BEFORE the SPA build on purpose: vet compiles the module against
      # the committed tree, so a clone that can't build (e.g. a deleted
      # web/dist/.gitkeep breaking go:embed) fails here instead of being
      # masked by npm having just recreated web/dist.
      - name: go vet (fresh clone, no SPA build)
        run: go vet ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build dashboard SPA
        run: cd web && npm ci && npm run build

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race ./...
