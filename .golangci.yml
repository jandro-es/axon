version: "2"

run:
  timeout: 5m

linters:
  # The standard set: errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - misspell
    - unconvert
    - nolintlint
  settings:
    errcheck:
      # Idiomatic best-effort calls: terminal/status printing and deferred
      # Close. Everything else must check its error.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Closer).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*os.File).Close
  exclusions:
    rules:
      # Table-driven tests legitimately ignore errors when asserting failures.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
