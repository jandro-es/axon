<svg xmlns="http://www.w3.org/2000/svg" width="736" height="944" viewBox="0 0 736 944" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, sans-serif">
<rect width="736" height="944" fill="#ffffff"/>
