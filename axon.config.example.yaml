# =============================================================================
# axon.config.example.yaml
# -----------------------------------------------------------------------------
# Copy to `~/.axon/config.yaml` and edit (`mkdir -p ~/.axon && cp
# axon.config.example.yaml ~/.axon/config.yaml`). AXON reads that path by default
# ($AXON_HOME/config.yaml); pass `--config <path>` to use a different file. This
# is the single declarative surface for AXON's behaviour. Secrets do NOT live
# here — they live in `.env` (or the OS keychain) and are referenced by name as
# `env:NAME` / `keychain:NAME`.
#
# Validated by struct tags + a validator in the `config` package; run
# `axon config validate` to check.
# Resolution precedence for any setting:
#   CLI flag  ->  AXON_* env  ->  profiles.<active>  ->  top-level  ->  built-in
#
# ONE INSTALLATION = ONE ACTIVE PROFILE. The personal and work instances are
# SEPARATE installations on separate machines (different Claude accounts and
# restrictions); they never run side by side in one process. The `profiles:`
# map simply lets you keep both templates in version control. `active_profile`
# (or AXON_PROFILE) picks which one this installation runs.
#
# Authentication (`claude.auth_mode`) — AXON reaches Claude through Claude Code
# (`claude -p` headless for automations + interactive in the vault), NOT through
# a direct API key, except in the optional `api_key` mode:
#   subscription : Claude Pro/Max login. No API key. Headless automations use a
#                  CLAUDE_CODE_OAUTH_TOKEN from `claude setup-token`.
#   enterprise   : Claude Enterprise SSO login. No API available. Same headless
#                  token IF your org permits `claude setup-token`; otherwise the
#                  daemon uses an already-authenticated Claude Code session.
#   api_key      : OPTIONAL. Direct Claude API via the Go SDK (exact count_tokens
#                  + per-dollar cost). Only for accounts with Console API access.
# =============================================================================

version: 1
project_name: axon            # drives the binary name, package scope and config keys

active_profile: personal      # this installation's profile; override with AXON_PROFILE / --profile

profiles:

  # ===========================================================================
  # PERSONAL installation — Claude Max subscription.
  # Permissive: all automations on, generous limits, open ingest.
  # ===========================================================================
  personal:
    vault_path: "~/Notes/Personal"            # the Obsidian vault (source of truth)
    data_dir: "~/.axon/profiles/personal"     # db.sqlite, logs/, exports/, snapshots/ (outside the vault)

    claude:
      auth_mode: subscription                 # subscription | enterprise | api_key
      config_dir: "~/.axon/profiles/personal/claude"   # CLAUDE_CONFIG_DIR — isolates the Claude account/creds
      # Headless automations (claude -p) need a non-interactive credential.
      # Generate once with `claude setup-token` (1-year OAuth token) and put it in .env.
      # Leave UNSET to rely on an interactive `claude login` session only (no scheduled automations).
      oauth_token: env:CLAUDE_CODE_OAUTH_TOKEN_PERSONAL
      # IMPORTANT: do NOT set ANTHROPIC_API_KEY anywhere — Claude Code prioritises it
      # over your subscription and bills the API account. `axon doctor` checks for this.

    dashboard:
      host: "127.0.0.1"                       # localhost only — never bind to 0.0.0.0
      port: 7777

    embeddings:
      provider: ollama                        # pluggable; ollama is the local default
      host: "http://localhost:11434"
      model: nomic-embed-text                 # 768-dim. Changing the model forces a full re-index.
      dim: 768                                # MUST match the model's output dimension
      batch_size: 32

    models:                                   # preferred Claude model per operation class.
      classify:  claude-haiku-4-5             # passed to `claude -p --model`; actual availability
      routine:   claude-sonnet-4-6            # depends on your plan tier (VERIFY current model strings).
      synthesis: claude-opus-4-8

    limits:                                   # token awareness on subscription = rate-limit / Agent-SDK-credit
      daily_tokens:  1_500_000                # ESTIMATED input+output; guards burn, not dollars
      weekly_tokens: 8_000_000
      guard_pause_at_pct: 80                  # budget-guard pauses non-essential automations at 80%
      # daily_cost_usd: 5.0                   # api_key mode ONLY (ignored on subscription/enterprise)

    retrieval:
      top_k: 8                                # chunks fetched per query (hybrid lexical + semantic)
      max_context_tokens: 12_000              # hard ceiling on retrieved context assembled per call

    policy:
      data_residency: local-only
      egress_allowlist: ["localhost", "*"]    # "*" = permissive (fine for personal); Claude Code handles its own egress
      ingest_domains_allow: ["*"]             # ingest from anywhere PUBLIC — loopback/private/link-local IPs are always refused (SSRF guard), even with "*"
      ingest_domains_deny: []
      redaction_rules: []                     # regex patterns scrubbed from content BEFORE it reaches Claude
      allowed_automations: ["*"]              # allow-list gate; "*" = all permitted

    automations:
      # schedule = cron (5-field). model = which `models:` class (or `none` for no Claude call).
      # budget_tokens caps a single run (estimated). catch_up: skip = don't backfill missed runs.
      heartbeat:         { enabled: true,  schedule: "0 9,13,17 * * *", model: classify,  budget_tokens: 50_000,  catch_up: skip }
      daily-log:         { enabled: true,  schedule: "30 21 * * *",     model: routine,   budget_tokens: 120_000 }
      inbox-triage:      { enabled: true,  schedule: "*/30 * * * *",    model: routine,   budget_tokens: 80_000,  dry_run: false }
      compaction:        { enabled: true,  schedule: "0 3 * * 0",       model: synthesis, budget_tokens: 300_000 }
      context-export:    { enabled: true,  schedule: "0 4 * * 0",       model: none,      budget_tokens: 0 }
      knowledge-reindex: { enabled: true,  schedule: "0 2 * * *",       model: none,      budget_tokens: 0 }
      knowledge-digest:  { enabled: true,  schedule: "0 8 * * 1",       model: synthesis, budget_tokens: 200_000 }
      link-suggester:    { enabled: true,  schedule: "0 1 * * *",       model: classify,  budget_tokens: 60_000 }
      memory-distill:    { enabled: true,  schedule: "0 5 * * *",       model: synthesis, budget_tokens: 120_000 }
      budget-guard:      { enabled: true,  schedule: "*/15 * * * *",    model: none,      budget_tokens: 0 }

    # Personal identity & memory layer (Component 12). Injected at SessionStart so
    # the assistant knows you. Optional block — these are the defaults.
    memory:
      inject: true            # inject USER/SOUL/recent MEMORY at session start (no model call)
      session_tokens: 1500    # token ceiling for the injected profile block
      recent_entries: 10      # how many newest MEMORY entries to inject

    # Optional interop (FR-54): register a community Obsidian MCP server alongside
    # AXON's own when running `axon mcp install`. AXON's server stays the default
    # vault contract; this is an alternative backend a client can also use.
    interop:
      obsidian_mcp:
        enabled: false                       # set true to register it
        command: "npx"
        args: ["-y", "obsidian-mcp", "~/Notes/Personal"]
        # env: { OBSIDIAN_API_KEY: "..." }   # if the community server needs one

  # ===========================================================================
  # WORK installation (SEPARATE machine) — Claude Enterprise SSO, no API.
  # Locked down: fewer automations, tighter limits, deny-by-default ingest,
  # redaction on. Provisioned by `AXON_PROFILE=work axon init` on the work box.
  # ===========================================================================
  work:
    vault_path: "~/Notes/Work"
    data_dir: "~/.axon/profiles/work"

    claude:
      auth_mode: enterprise                   # SSO login via `claude login`; governed by org policy
      config_dir: "~/.axon/profiles/work/claude"
      # Many enterprises permit `claude setup-token`; if yours does, supply it for headless automations.
      # If the org disables long-lived tokens, leave UNSET and run automations only while a Claude Code
      # session is authenticated (or drive them interactively). `axon doctor` reports which is available.
      oauth_token: env:CLAUDE_CODE_OAUTH_TOKEN_WORK
      # No ANTHROPIC_API_KEY — the work org does not expose Console API access.

    dashboard: { host: "127.0.0.1", port: 7777 }   # same port is fine — never co-runs with personal

    embeddings: { provider: ollama, model: bge-m3, dim: 1024, batch_size: 16 }   # different model => its own index

    models:   { classify: claude-haiku-4-5, routine: claude-sonnet-4-6, synthesis: claude-sonnet-4-6 }

    limits:   { daily_tokens: 600_000, weekly_tokens: 3_000_000, guard_pause_at_pct: 70 }

    retrieval: { top_k: 6, max_context_tokens: 8_000 }

    policy:
      data_residency: local-only
      egress_allowlist: ["localhost"]                                     # strict — no wildcard
      ingest_domains_allow: ["docs.internal.example.com", "github.com"]   # only these may be ingested
      ingest_domains_deny: ["*"]                                          # deny everything else
      redaction_rules:
        - "(?i)client[-_ ]?name:\\s*\\S+"   # scrub "client name: …"
        - "AKIA[0-9A-Z]{16}"                # scrub AWS access key IDs
      # Allow-list gate: even if an automation is enabled below, it only runs if listed here.
      allowed_automations: ["heartbeat", "daily-log", "inbox-triage", "knowledge-reindex", "budget-guard"]

    automations:
      # Overrides only — unlisted automations inherit defaults but are still gated by allowed_automations.
      compaction:       { enabled: false }
      knowledge-digest: { enabled: false }
      link-suggester:   { enabled: false }
      context-export:   { enabled: true, schedule: "0 18 * * 5" }   # weekly, Friday evening

    # Stricter environment: do NOT inject the personal profile into sessions.
    # The identity layer still lives in the vault but is never auto-injected.
    memory: { inject: false }

# =============================================================================
# Optional price table — `auth_mode: api_key` ONLY (subscription/enterprise are
# not billed per token, so cost is recorded as null there and limits are tracked
# in tokens instead). Keep prices OUT of code so they update without a release.
# -----------------------------------------------------------------------------
# prices:
#   claude-haiku-4-5:  { input: 0.0000008,  output: 0.000004,  cache_read: 0.00000008 }
#   claude-sonnet-4-6: { input: 0.000003,   output: 0.000015,  cache_read: 0.0000003 }
#   claude-opus-4-8:   { input: 0.000015,   output: 0.000075,  cache_read: 0.0000015 }
#   # ^ ILLUSTRATIVE ONLY — confirm current prices before relying on cost figures.
# =============================================================================
